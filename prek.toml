# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

default_install_hook_types = [
  "pre-commit",
  "commit-msg"
  ]
default_stages = ["pre-commit"]

[[repos]]
repo = "builtin"
hooks = [
  { id = "check-executables-have-shebangs" },
  { id = "check-json" },
  { id = "check-merge-conflict" },
  { id = "check-symlinks" },
  { id = "check-toml" },
  { id = "check-yaml" },
  { id = "detect-private-key" },
  { id = "end-of-file-fixer" },
  { id = "fix-byte-order-marker" },
  { id = "mixed-line-ending" },
  { id = "trailing-whitespace" },
]

[[repos]]
repo = "meta"
hooks = [
  { id = "check-useless-excludes" },
]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.8"
hooks = [
  {
    id = "ruff-format",
    name = "ruff format",
    types = ["python"]
  },
  {
    id = "ruff",
    name = "ruff check",
    args = ["--fix"],
    types = ["python"]
  }
]

[[repos]]
repo = "https://github.com/djlint/djLint"
rev = "v1.36.4"
hooks = [
  {
    id = "djlint-reformat",
    types = ["html"],
    files = "templates/",
  },
  {
    id = "djlint",
    types = ["html"],
    files = "templates/",
  }
]

[[repos]]
repo = "https://github.com/JoC0de/pre-commit-prettier"
rev = "v3.8.1"
hooks = [
  {
    id = "prettier",
    types_or = [
      "css",
      "javascript",
      "markdown",
      "json",
      "toml",
      "yaml"
    ]
  }
]

[[repos]]
repo = "https://github.com/codespell-project/codespell"
rev = "v2.4.2"
hooks = [
  {
    id = "codespell",
    additional_dependencies = ["tomli"]
  }
]

[[repos]]
repo = "https://github.com/astral-sh/uv-pre-commit"
rev = "0.11.2"
hooks = [
  { id = "uv-lock" }
]

[[repos]]
repo = "local"
hooks = [
  {
    id = "check-post-metadata",
    name = "Check post metadata format",
    language = "system",
    entry = "python3 scripts/check_metadata.py",
    types = ["markdown"],
    files = "^content/",
    exclude = "^content/pages/",
  },
  {
    id = "check-internal-links",
    name = "Check internal links resolve",
    language = "system",
    entry = "python3 scripts/check_links.py",
    types = ["markdown"],
    files = "^content/",
  },
]

[[repos]]
repo = "https://github.com/compilerla/conventional-pre-commit"
rev = "v4.4.0"
hooks = [
  {
    id = "conventional-pre-commit",
    stages = ["commit-msg"],
    args = [
      "feat",
      "fix",
      "build",
      "ci",
      "chore",
      "docs",
      "drop",
      "edit",
      "perf",
      "polish",
      "root",
      "refactor",
      "revert",
      "style",
      "temp",
      "tests"
    ]
  }
]
